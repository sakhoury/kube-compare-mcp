# SPDX-License-Identifier: Apache-2.0
# golangci-lint configuration (v2 format)
# Based on openshift/kube-compare and Go best practices for MCP servers
#
# Run: make lint
# Install: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

version: "2"

run:
  timeout: 5m
  concurrency: 6
  tests: true

output:
  sort-order:
    - file
    - linter

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sakhoury/kube-compare-mcp

linters:
  default: none
  enable:
    # Essential
    - errcheck
    - govet
    - staticcheck
    - unused

    # Code quality
    - ineffassign
    - unconvert
    - unparam
    - goconst

    # Security
    - gosec

    # Style
    - misspell
    - revive
    - dupword

    # Error handling
    - errorlint
    - wrapcheck

    # Complexity
    - gocyclo
    - gocritic

    # Dependencies and imports
    - depguard
    - loggercheck
    - nolintlint

    # Modern Go idioms (adopted by Kubernetes, Prometheus, Docker)
    - modernize
    - copyloopvar
    - usestdlibvars
    - nilnesserr
    - fatcontext

    # HTTP correctness
    - bodyclose
    - noctx

    # Performance
    - perfsprint

  settings:
    gocyclo:
      min-complexity: 20

    errcheck:
      check-type-assertions: true

    revive:
      rules:
        - name: if-return
          disabled: true
        - name: string-format
          disabled: false
          arguments:
            - - 'fmt.Errorf[0]'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter
            - - 'fmt.Errorf[0]'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation
            - - panic
              - '/^[^\n]*$/'
              - must not contain line breaks

    gocritic:
      enabled-checks:
        - commentedOutCode
        - nilValReturn
        - weakCond
        - sloppyReassign
        - equalFold
        - appendCombine
        - boolExprSimplify
        - commentedOutImport
        - emptyFallthrough
        - emptyStringTest
        - unlabelStmt
        - nestingReduce
        - unnecessaryBlock
        - paramTypeCombine

    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - $all
          deny:
            - pkg: "github.com/pkg/errors"
              desc: Should be replaced by standard lib errors package
            - pkg: "io/ioutil"
              desc: Deprecated - use io and os packages instead

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - NewValidationError(
        - NewCompareError(
        - NewSecurityError(

    gosec:
      excludes:
        - G101

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    perfsprint:
      int-conversion: true
      err-error: false
      errorf: true
      sprintf1: true
      strconcat: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"

      - path: _test\.go
        linters:
          - unparam

      - path: _test\.go
        linters:
          - wrapcheck

      - path: _test\.go
        linters:
          - gocyclo

      - path: _test\.go
        linters:
          - noctx

      # G704 taint analysis rules don't respect gosec.excludes or nolint directives
      - linters:
          - gosec
        text: "G704"

    presets:
      - std-error-handling

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
